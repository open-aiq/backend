root = "."
tmp_dir = "tmp"

[build]
  cmd = "swag init -g cmd/server/main.go -o docs && go build -o bin/server ./cmd/server/"
  bin = "bin/server"
  delay = 1000
  exclude_dir = ["tmp", "bin", "docs", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
